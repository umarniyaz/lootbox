<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎁 Lootbox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #08080f;
            background-image: 
                radial-gradient(ellipse at 50% 30%, rgba(108, 92, 231, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 40%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        /* Arka plan ışıkları */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.15;
        }
        .bg-glow.g1 { top: -100px; left: -100px; background: #6c5ce7; }
        .bg-glow.g2 { bottom: -100px; right: -100px; background: #ffd700; }

        .container {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* Başlık */
        .title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            margin-bottom: 30px;
        }

        /* KUTU */
        .box-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin-bottom: 35px;
        }

        .box-glow {
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .box-shadow {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 25px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(8px);
        }

        .box {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1a1a2e, #0d0d1a);
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 90px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            animation: floatBox 5s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 60px rgba(255,215,0,0.02);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 31px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), transparent 40%, rgba(255,215,0,0.05));
            z-index: -1;
        }

        @keyframes floatBox {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(0.5deg); }
        }

        .box-emoji {
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.05));
            transition: all 0.3s ease;
            line-height: 1;
        }

        /* Açılış animasyonu */
        .box.shake {
            animation: shakeBox 0.4s ease-in-out 3 !important;
        }
        @keyframes shakeBox {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        .box.spin {
            animation: spinBox 0.7s ease-in-out !important;
        }
        @keyframes spinBox {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .box.zoom {
            animation: zoomBox 0.5s ease !important;
        }
        @keyframes zoomBox {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .box.flash {
            animation: flashBox 0.5s ease !important;
        }
        @keyframes flashBox {
            0% { box-shadow: 0 0 20px rgba(255,215,0,0.1); }
            50% { box-shadow: 0 0 80px rgba(255,215,0,0.3), 0 0 150px rgba(255,215,0,0.1); }
            100% { box-shadow: 0 0 20px rgba(255,215,0,0.1); }
        }

        .box.open {
            animation: openBox 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
        }
        @keyframes openBox {
            0% { transform: scale(1); }
            30% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Işık patlaması */
        .burst {
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.25) 0%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .burst.active {
            opacity: 1;
            animation: burstAnim 0.7s ease-out forwards;
        }
        @keyframes burstAnim {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* KART BİLGİSİ */
        .card-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 50px;
            padding: 12px 28px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .card-icon { font-size: 20px; opacity: 0.6; }
        .card-label { font-size: 14px; color: rgba(255,255,255,0.3); font-weight: 500; }
        .card-count { font-size: 20px; font-weight: 700; color: #ffd700; }

        /* BUTON */
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 18px;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 700;
            color: #0a0a12;
            background: linear-gradient(135deg, #ffd700, #f5a623);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 30px rgba(255,215,0,0.15);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* MESAJ */
        .msg {
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            min-height: 22px;
            text-align: center;
        }
        .msg.error { color: #ff6b6b; }
        .msg.success { color: #51cf66; }

        /* ÖDÜL MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }

        .modal-card {
            background: #12121f;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 40px;
            padding: 40px 32px 32px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.8) rotate(-3deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .modal-emoji { font-size: 70px; display: block; margin-bottom: 12px; }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .modal-sub { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }

        .modal-btn {
            padding: 14px 40px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.04);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn:active { transform: scale(0.96); }

        @media (max-width: 420px) {
            .box-wrapper { width: 180px; height: 180px; }
            .box { font-size: 70px; }
            .btn { font-size: 15px; padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>

    <div class="container">
        <div class="title">✦ Premium Lootbox</div>

        <div class="box-wrapper">
            <div class="box-glow"></div>
            <div class="burst" id="burst"></div>
            <div class="box" id="box">
                <span class="box-emoji" id="boxEmoji">🎁</span>
            </div>
            <div class="box-shadow"></div>
        </div>

        <div class="card-info">
            <span class="card-icon">🃏</span>
            <span class="card-label">Kart</span>
            <span class="card-count" id="cardCount">5</span>
        </div>

        <button class="btn" id="btnOpen">🎯 KUTUYU AÇ</button>
        <div class="msg" id="msg">🔮 Kutuyu açmak için tıkla</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-card">
            <span class="modal-emoji" id="modalEmoji">👑</span>
            <div class="modal-title" id="modalTitle">Tebrikler!</div>
            <div class="modal-sub" id="modalSub">Ödül kazandınız</div>
            <button class="modal-btn" id="modalBtn">✨ Harika!</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        let cards = 5;
        let isOpening = false;
        const box = document.getElementById('box');
        const emoji = document.getElementById('boxEmoji');
        const cardEl = document.getElementById('cardCount');
        const btn = document.getElementById('btnOpen');
        const msg = document.getElementById('msg');
        const modal = document.getElementById('modal');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalSub = document.getElementById('modalSub');
        const modalBtn = document.getElementById('modalBtn');
        const burst = document.getElementById('burst');

        const rewards = [
            { emoji: '🪙', title: '50 Coin', sub: '+50 Coin kazandın!' },
            { emoji: '💰', title: '100 Coin', sub: '+100 Coin kazandın!' },
            { emoji: '💎', title: '250 Coin', sub: '+250 Coin kazandın!' },
            { emoji: '👑', title: '500 Coin', sub: '500 Coin! Efsane!' },
            { emoji: '⭐', title: '1000 Coin', sub: 'BÜYÜK İKRAMİYE! 1000 Coin!' },
            { emoji: '🔥', title: 'Free Spin', sub: '1 ücretsiz spin kazandın!' },
        ];

        function updateUI() { cardEl.textContent = cards; }

        function showMsg(text, type = '') {
            msg.textContent = text;
            msg.className = 'msg ' + type;
            setTimeout(() => { if (msg.textContent === text) { msg.textContent = ''; msg.className = 'msg'; } }, 3000);
        }

        function getReward() { return rewards[Math.floor(Math.random() * rewards.length)]; }

        function openBox() {
            if (isOpening) return;
            if (cards <= 0) {
                showMsg('❌ Kartın yok! Yeni kart al.', 'error');
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            isOpening = true;
            btn.disabled = true;
            cards--;
            updateUI();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            box.className = 'box shake';
            showMsg('🎯 Kutu açılıyor...');

            setTimeout(() => {
                box.className = 'box spin';
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }, 1200);

            setTimeout(() => {
                box.className = 'box zoom';
                showMsg('✨ Işık saçılıyor...');
            }, 1900);

            setTimeout(() => {
                box.className = 'box flash';
                burst.classList.add('active');
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                setTimeout(() => burst.classList.remove('active'), 700);
            }, 2400);

            setTimeout(() => {
                const r = getReward();
                emoji.textContent = r.emoji;
                box.className = 'box open';
                showMsg(`🎉 ${r.title} kazandın!`, 'success');
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                setTimeout(() => {
                    modalEmoji.textContent = r.emoji;
                    modalTitle.textContent = r.title;
                    modalSub.textContent = r.sub;
                    modal.classList.add('active');
                    isOpening = false;
                    btn.disabled = false;
                    setTimeout(() => { emoji.textContent = '🎁'; }, 500);
                }, 600);
            }, 2900);
        }

        btn.addEventListener('click', openBox);
        modalBtn.addEventListener('click', () => { modal.classList.remove('active'); showMsg('🎯 Devam et!'); });
        modal.addEventListener('click', (e) => { if (e.target === modal) { modal.classList.remove('active'); showMsg('🎯 Devam et!'); } });
        document.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !modal.classList.contains('active')) openBox(); });

        updateUI();
        showMsg('🔮 Kutuyu açmak için tıkla');
        console.log('🎁 Lootbox Premium v2');
    </script>
</body>
</html>
