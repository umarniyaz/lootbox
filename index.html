<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Kutu Aç</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #0a0a12);
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .balance {
            background: rgba(255,215,0,0.1);
            padding: 6px 14px;
            border-radius: 40px;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255,215,0,0.1);
        }
        .box {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .box.mega { border-color: rgba(255,200,50,0.1); }
        .box.legendary { border-color: rgba(200,50,255,0.1); }
        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .box-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #fff);
        }
        .badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 600;
        }
        .badge-epic { background: rgba(255,200,50,0.15); color: #ffd700; }
        .badge-legendary { background: rgba(200,50,255,0.15); color: #d4a0ff; }
        .box-emoji {
            text-align: center;
            font-size: 64px;
            padding: 12px 0;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-mega {
            background: linear-gradient(135deg, #ffd700, #f5a623);
            color: #1a1a2e;
        }
        .btn-legendary {
            background: linear-gradient(135deg, #ff6bcb, #b35cff);
            color: white;
        }
        .reward {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            min-height: 24px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user">
                <div class="avatar" id="avatar">👤</div>
                <span id="username" style="color: var(--tg-theme-text-color, #fff); font-weight: 600;">Player</span>
            </div>
            <div class="balance">💎 <span id="balance">100</span></div>
        </div>

        <div class="box mega">
            <div class="box-header">
                <div class="box-title">⭐ Mega Box</div>
                <span class="badge badge-epic">EPIC</span>
            </div>
            <div class="box-emoji" id="megaEmoji">🎁</div>
            <button class="btn btn-mega" id="megaBtn">🔓 UNLOCK</button>
            <div class="reward" id="megaReward"></div>
        </div>

        <div class="box legendary">
            <div class="box-header">
                <div class="box-title">👑 Legendary Box</div>
                <span class="badge badge-legendary">LEGENDARY</span>
            </div>
            <div class="box-emoji" id="legendaryEmoji">💎</div>
            <button class="btn btn-legendary" id="legendaryBtn">🔓 UNLOCK</button>
            <div class="reward" id="legendaryReward"></div>
        </div>

        <div class="footer">⚡ Telegram Web App</div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
            if (tg.initDataUnsafe?.user) {
                document.getElementById('username').textContent = tg.initDataUnsafe.user.first_name || 'Player';
            }
        }

        let balance = 100;
        let megaUnlocked = false;
        let legendaryUnlocked = false;

        const megaItems = ['🪙 500 Coin', '⚔️ Kılıç', '🛡️ Kalkan', '💊 İksir', '🌟 Yıldız'];
        const legendaryItems = ['👑 Taç', '🐉 Ejderha', '💎 Elmas', '🔮 Küre', '⚡ Yıldırım'];

        function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function updateBalance(amount) {
            balance += amount;
            document.getElementById('balance').textContent = balance;
        }

        function unlockBox(type) {
            const isMega = type === 'mega';
            const emoji = document.getElementById(isMega ? 'megaEmoji' : 'legendaryEmoji');
            const rewardEl = document.getElementById(isMega ? 'megaReward' : 'legendaryReward');
            const btn = document.getElementById(isMega ? 'megaBtn' : 'legendaryBtn');
            const isUnlocked = isMega ? megaUnlocked : legendaryUnlocked;
            const items = isMega ? megaItems : legendaryItems;

            if (isUnlocked) {
                const reward = getRandom(items);
                emoji.textContent = '🎉';
                rewardEl.textContent = `✨ ${reward}`;
                updateBalance(10);
                return;
            }

            const reward = getRandom(items);
            emoji.textContent = '🎉';
            rewardEl.textContent = `🎊 ${reward}`;
            btn.textContent = '🔄 OPEN AGAIN';
            updateBalance(25);
            
            if (isMega) megaUnlocked = true;
            else legendaryUnlocked = true;
        }

        document.getElementById('megaBtn').onclick = () => unlockBox('mega');
        document.getElementById('legendaryBtn').onclick = () => unlockBox('legendary');
    </script>
</body>
</html>
