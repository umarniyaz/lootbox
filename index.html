<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎁 Lootbox Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #0a0a12;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .lootbox {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(145deg, #1a1a2e, #0d0d1a);
            border-radius: 24px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            cursor: pointer;
            animation: floatBox 4s ease-in-out infinite;
        }
        @keyframes floatBox {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lootbox">🎁</div>
        <p>Kart: 5</p>
        <button style="padding:16px 32px;border:none;border-radius:60px;background:#ffd700;color:#0a0a12;font-size:18px;font-weight:700;cursor:pointer;">KUTUYU AÇ</button>
    </div>
    <script>
        console.log('Lootbox çalışıyor');
    </script>
</body>
</html>
